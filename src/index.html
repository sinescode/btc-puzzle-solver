<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC Puzzle Solver</title>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--card:rgba(255,255,255,.03);
  --accent:#f7931a;--gold:#ffb347;--green:#00d4aa;
  --fg:#fff;--fg2:#8b8ba7;--fg3:#5a5a7a;--line:rgba(255,255,255,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--fg);min-height:100vh;display:flex;
  justify-content:center;align-items:center;padding:24px;line-height:1.5}
.container{max-width:640px;width:100%}
.header{text-align:center;margin-bottom:40px}
.logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--gold));
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:28px;box-shadow:0 0 40px rgba(247,147,26,.15)}
h1{font-size:1.5em;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
.subtitle{color:var(--fg2);font-size:.9em}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
.stat:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}
.lbl{font-size:.75em;font-weight:500;text-transform:uppercase;letter-spacing:.05em;
  color:var(--fg3);margin-bottom:8px}
.val{font-size:1.6em;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.val.orange{color:var(--accent)}.val.green{color:var(--green)}.val.white{color:var(--fg)}
.bar,.target,.samples{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:14px 20px;margin-bottom:16px}
.bar{display:flex;align-items:center;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.dot.searching{animation:pulse 2s infinite}.dot.found{background:var(--green)}
.dot.dead{background:var(--fg3);animation:none}
.target-lbl{font-size:.7em;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.target-addr{font-family:'SF Mono','Fira Code',monospace;font-size:.82em;color:var(--fg2);
  word-break:break-all}
.found{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:16px;
  padding:24px;margin-bottom:16px;display:none}
.found.show{display:block}
.found h3{color:var(--green);font-size:.85em;text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:12px}
.found .k{font-family:'SF Mono','Fira Code',monospace;font-size:.9em;word-break:break-all;
  line-height:1.8}
.samples{max-height:320px;overflow-y:auto;padding:20px}
.samples::-webkit-scrollbar{width:4px}
.samples::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:2px}
.samples h3{font-size:.75em;color:var(--fg3);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:14px}
.entry{font-family:'SF Mono','Fira Code',monospace;font-size:.78em;padding:10px 14px;
  margin-bottom:4px;background:rgba(0,0,0,.2);border-radius:8px;display:flex;
  flex-wrap:wrap;gap:8px 16px;word-break:break-all}
.meta{color:var(--fg3);white-space:nowrap}
.kkey{color:var(--gold)}.kaddr{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:480px){body{padding:16px}.grid{gap:8px}.stat{padding:16px}.val{font-size:1.3em}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">&#8383;</div>
    <h1>BTC Puzzle Solver</h1>
    <div class="subtitle">Private key recovery engine</div>
  </div>

  <div class="grid">
    <div class="stat"><div class="lbl">Keys Checked</div><div class="val orange" id="total">0</div></div>
    <div class="stat"><div class="lbl">Keys / sec</div><div class="val green" id="kps">0</div></div>
    <div class="stat"><div class="lbl">Elapsed</div><div class="val white" id="elapsed">0s</div></div>
    <div class="stat"><div class="lbl">Status</div><div class="val white" id="status">Starting…</div></div>
  </div>

  <div class="bar">
    <div class="dot searching" id="dot"></div>
    <div id="msg">Searching for private key…</div>
  </div>

  <div class="target">
    <div class="target-lbl">Target Address</div>
    <div class="target-addr" id="target-addr">—</div>
  </div>

  <div class="found" id="found">
    <h3>Private Key Found</h3>
    <div class="k" id="key"></div>
  </div>

  <div class="samples">
    <h3>Sample Keys</h3>
    <div id="samples"></div>
  </div>
</div>

<script>
function fmtN(n){
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Number(n).toLocaleString();
}
function fmtT(s){
  if(s<60) return Math.floor(s)+'s';
  if(s<3600) return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
}
function text(parent, content){
  const s = document.createElement('span');
  s.textContent = content;
  parent.appendChild(s);
}
const $ = id => document.getElementById(id);

let ws, backoff = 500;
function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { backoff = 500; };
  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if(m.type === 'stats'){
      $('total').textContent  = fmtN(m.total);
      $('kps').textContent    = fmtN(m.kps);
      $('elapsed').textContent= fmtT(m.elapsed);
      $('status').textContent = 'Searching…';
    } else if(m.type === 'found'){
      $('dot').className = 'dot found';
      $('msg').innerHTML = '<strong>Key recovered!</strong>';
      $('status').textContent = 'Found';
      $('found').className = 'found show';
      $('key').textContent = `Key: ${m.key}\nAddress: ${m.address || '(see found_key.txt)'}`;
      $('samples').parentNode.removeChild($('samples').parentNode);
    } else if(m.type === 'sample'){
      const row = document.createElement('div');
      row.className = 'entry';
      const m1 = document.createElement('span'); m1.className='meta';
      m1.textContent = `~${m.milestone}M T${m.thread}`;
      const k = document.createElement('span'); k.className='kkey';
      k.textContent = m.key;
      const a = document.createElement('span'); a.className='kaddr';
      a.textContent = m.address;
      row.append(m1,k,a);
      const wrap = $('samples');
      wrap.appendChild(row); wrap.scrollTop = wrap.scrollHeight;
      while(wrap.children.length > 40) wrap.removeChild(wrap.firstChild);
    }
  };
  ws.onerror = () => {/* let onclose handle */};
  ws.onclose = () => {
    $('dot').className = 'dot dead';
    $('msg').innerHTML = '<strong>Disconnected. Reconnecting…</strong>';
    $('status').textContent = '—';
    setTimeout(connect, backoff);
    backoff = Math.min(backoff*2, 8000);
  };
}
connect();
</script>
</body>
</html>
