<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Puzzle Solver</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --accent-orange: #f7931a;
            --accent-gold: #ffb347;
            --accent-green: #00d4aa;
            --text-primary: #ffffff;
            --text-secondary: #8b8ba7;
            --text-dim: #5a5a7a;
            --border-subtle: rgba(255,255,255,0.06);
            --glow-orange: 0 0 40px rgba(247,147,26,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            box-shadow: var(--glow-orange);
        }

        h1 {
            font-size: 1.5em;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            transition: background 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255,255,255,0.1);
        }

        .stat-label {
            font-size: 0.75em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.6em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .stat-value.orange { color: var(--accent-orange); }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.white { color: var(--text-primary); }

        .status-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-orange);
            flex-shrink: 0;
        }

        .status-dot.searching { animation: pulse 2s infinite; }
        .status-dot.found { background: var(--accent-green); }

        .status-text {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .status-text strong { color: var(--text-primary); font-weight: 500; }

        .target-box {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 16px;
        }

        .target-label {
            font-size: 0.7em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .target-addr {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82em;
            color: var(--text-secondary);
            word-break: break-all;
            letter-spacing: -0.01em;
        }

        .found-panel {
            background: rgba(0,212,170,0.08);
            border: 1px solid rgba(0,212,170,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            display: none;
        }

        .found-panel.visible { display: block; }

        .found-panel h3 {
            color: var(--accent-green);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .found-panel .key {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            word-break: break-all;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .samples-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            max-height: 320px;
            overflow-y: auto;
        }

        .samples-panel::-webkit-scrollbar { width: 4px; }
        .samples-panel::-webkit-scrollbar-track { background: transparent; }
        .samples-panel::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

        .samples-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .samples-header h3 {
            font-size: 0.75em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .sample-entry {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.78em;
            padding: 10px 14px;
            margin-bottom: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            word-break: break-all;
        }

        .sample-meta { color: var(--text-dim); white-space: nowrap; }
        .sample-key { color: var(--accent-gold); }
        .sample-addr { color: var(--accent-green); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .container { padding: 0; }
            .grid { gap: 8px; }
            .stat-card { padding: 16px; }
            .stat-value { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">&#8383;</div>
            <h1>BTC Puzzle Solver</h1>
            <div class="subtitle">Private key recovery engine</div>
        </div>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-label">Keys Checked</div>
                <div class="stat-value orange" id="total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Keys / sec</div>
                <div class="stat-value green" id="kps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Elapsed</div>
                <div class="stat-value white" id="elapsed">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value white" id="status-text">Starting...</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-dot searching" id="status-dot"></div>
            <div class="status-text" id="status">Searching for private key...</div>
        </div>

        <div class="target-box">
            <div class="target-label">Target Address</div>
            <div class="target-addr">1PWo3JeB9jrGwfHDNpdGK54CRas7fsVzXU</div>
        </div>

        <div class="found-panel" id="found-panel">
            <h3>Private Key Found</h3>
            <div class="key" id="key-value"></div>
        </div>

        <div class="samples-panel" id="samples">
            <div class="samples-header">
                <h3>Sample Keys</h3>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const totalEl = document.getElementById('total');
        const kpsEl = document.getElementById('kps');
        const elapsedEl = document.getElementById('elapsed');
        const statusTextEl = document.getElementById('status-text');
        const statusDotEl = document.getElementById('status-dot');
        const statusEl = document.getElementById('status');
        const foundPanelEl = document.getElementById('found-panel');
        const keyValueEl = document.getElementById('key-value');
        const samplesEl = document.getElementById('samples');

        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function formatTime(secs) {
            if (secs < 60) return Math.floor(secs) + 's';
            if (secs < 3600) return Math.floor(secs / 60) + 'm ' + Math.floor(secs % 60) + 's';
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            return h + 'h ' + m + 'm';
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'stats') {
                totalEl.textContent = formatNumber(data.total);
                kpsEl.textContent = formatNumber(data.kps);
                elapsedEl.textContent = formatTime(data.elapsed);
                statusTextEl.textContent = 'Searching...';
            } else if (data.type === 'found') {
                statusDotEl.className = 'status-dot found';
                statusDotEl.style.animation = 'none';
                statusEl.innerHTML = '<strong>Key recovered!</strong>';
                statusTextEl.textContent = 'Found';
                foundPanelEl.className = 'found-panel visible';
                keyValueEl.textContent = `Key: ${data.key}\nAddress: ${data.address}`;
            } else if (data.type === 'sample') {
                const entry = document.createElement('div');
                entry.className = 'sample-entry';
                entry.innerHTML = `<span class="sample-meta">~${data.milestone}M T${data.thread}</span><span class="sample-key">${data.key}</span><span class="sample-addr">${data.address}</span>`;
                samplesEl.appendChild(entry);
                samplesEl.scrollTop = samplesEl.scrollHeight;
                while (samplesEl.children.length > 40) {
                    samplesEl.removeChild(samplesEl.children[1]);
                }
            }
        };

        ws.onclose = () => {
            statusDotEl.className = 'status-dot';
            statusDotEl.style.background = 'var(--text-dim)';
            statusDotEl.style.animation = 'none';
            statusEl.innerHTML = '<strong>Disconnected</strong>';
            statusTextEl.textContent = '—';
        };
    </script>
</body>
</html>
